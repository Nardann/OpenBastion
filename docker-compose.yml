networks:
  frontend-net:
  backend-net:
    internal: true

services:
  postgres:
    image: postgres:17-alpine
    container_name: bastion-postgres
    restart: always
    networks:
      - backend-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data_v17
    volumes:
      - ./pg_data_new:/var/lib/postgresql
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  guacd:
    build:
      context: .
      dockerfile: Dockerfile.guacd
    container_name: bastion-guacd
    restart: always
    profiles:
      - rdp
    # Jamais expose sur le reseau frontend, jamais de port publie sur l'hote.
    networks:
      - backend-net
    # Hardening : rien a ecrire, aucun privilege, tmpfs pour logs runtime.
    read_only: true
    tmpfs:
      - /tmp:size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Contraintes de ressources (guacd RDP-only consomme tres peu au repos)
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4822 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bastion-backend
    restart: always
    networks:
      - backend-net
      - frontend-net
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      VAULT_KEY: ${VAULT_KEY}
      VAULT_SALT: ${VAULT_SALT} # OBLIGATOIRE — générer avec: openssl rand -hex 16
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,https://localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RECORDINGS_PATH: /var/lib/bastion/recordings
      # Connexion au daemon guacd pour le proxy RDP (reseau interne uniquement)
      GUACD_HOST: ${GUACD_HOST:-guacd}
      GUACD_PORT: ${GUACD_PORT:-4822}
      ENABLE_RDP: ${ENABLE_RDP:-false}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile.frontend
    container_name: bastion-frontend
    restart: always
    networks:
      - frontend-net
    ports:
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3000}
    volumes:
      - ./certs:/etc/nginx/ssl
    depends_on:
      - backend
